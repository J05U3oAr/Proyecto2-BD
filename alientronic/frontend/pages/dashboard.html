<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ALIENTRONIC</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <main class="main-content">
    <div class="page-header">
      <div class="page-title">Dashboard</div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">⏻ Salir</button>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="loading"><div class="spinner"></div> Cargando...</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
      <div class="card">
        <div class="card-title">Ventas Recientes</div>
        <div id="recentSales"><div class="loading"><div class="spinner"></div></div></div>
      </div>
      <div class="card">
        <div class="card-title">Stock Bajo</div>
        <div id="lowStock"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
(async () => {
  const user = await checkAuth();
  if (!user) return;
  renderSidebar(user, 'dashboard.html');

  const [ventas, productos] = await Promise.all([
    fetch('/api/reportes/ventas-resumen', { credentials: 'include' }).then(r => r.json()),
    fetch('/api/productos', { credentials: 'include' }).then(r => r.json()),
  ]);

  const totalIngresos = ventas.reduce((s, v) => s + parseFloat(v.total || 0), 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Ventas</div>
      <div class="stat-value">${ventas.length}</div>
      <div class="stat-sub">Transacciones registradas</div>
      <div class="stat-icon">◆</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ingresos Totales</div>
      <div class="stat-value" style="font-size:1.3rem">${fmtMoney(totalIngresos)}</div>
      <div class="stat-sub">Suma de todas las ventas</div>
      <div class="stat-icon">◈</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Productos</div>
      <div class="stat-value">${productos.length}</div>
      <div class="stat-sub">${productos.filter(p => p.stock < 5).length} con stock bajo</div>
      <div class="stat-icon">◉</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ticket Promedio</div>
      <div class="stat-value" style="font-size:1.3rem">${ventas.length ? fmtMoney(totalIngresos / ventas.length) : 'Q 0'}</div>
      <div class="stat-sub">Por venta</div>
      <div class="stat-icon">◐</div>
    </div>
  `;

  // Recent sales
  const recent = ventas.slice(0, 6);
  document.getElementById('recentSales').innerHTML = recent.length ? `
    <table><thead><tr>
      <th>#</th><th>Fecha</th><th>Cliente</th><th>Total</th>
    </tr></thead><tbody>
    ${recent.map(v => `<tr>
      <td><span class="badge badge-blue">#${v.id_venta}</span></td>
      <td>${fmtDate(v.fecha)}</td>
      <td>${v.cliente}</td>
      <td class="price">${fmtMoney(v.total)}</td>
    </tr>`).join('')}
    </tbody></table>
  ` : '<div class="empty"><p>Sin ventas</p></div>';

  // Low stock
  const low = productos.filter(p => parseInt(p.stock) < 10).sort((a,b) => a.stock - b.stock).slice(0,6);
  document.getElementById('lowStock').innerHTML = low.length ? `
    <table><thead><tr>
      <th>Producto</th><th>Categoría</th><th>Stock</th>
    </tr></thead><tbody>
    ${low.map(p => `<tr>
      <td>${p.nombre}</td>
      <td><span class="badge badge-blue">${p.categoria}</span></td>
      <td>${stockBadge(p.stock)}</td>
    </tr>`).join('')}
    </tbody></table>
  ` : '<div class="empty"><p>Todo en stock correcto</p></div>';
})();
</script>
</body>
</html>
